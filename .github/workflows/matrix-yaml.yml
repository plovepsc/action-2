name: This is a matrix yaml file
on:
  workflow_dispatch: # Runs manually
jobs:
    display:
        strategy:
            fail-fast: false
            max-parallel: 2
            matrix:
                os: [ubuntu-latest, windows-latest, ubuntu-22.04]
                image: [hello-world, alpine]
                exclude:
                    - os: windows-latest
                      image: alpine
                include:
                    - os: ubuntu-22.04    
                      image: amd64/alpine
        runs-on: ${{ matrix.os }}
        steps:
        - name: Echo Docker Details
          run: docker info
        - name: Run image on ${{ matrix.os }}
          run: docker run ${{ matrix.image }}