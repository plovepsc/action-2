name: My first workflow
on:
  push:
jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: install cowsay
          run: sudo apt-get install cowsay -y
        - name: execute cowsay
          run: cowsay -f dragon "Hello, World!" >> dragon.txt
        - name: test file exit
          run: grep -i "dragon" dragon.txt

        - name: read file
          run: cat dragon.txt
        - name: list repo file
          run: ls -ltra

    